spring:
  profiles:
    active: test

  datasource:
    # MariaDB 호환 모드로 동작하는 인메모리 H2 DB
    url: jdbc:h2:mem:testdb;MODE=MariaDB;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    # MariaDB 실제 환경과의 차이로 인한 쿼리 오류 방지
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Redis 설정
  data:
    redis:
      host: localhost
      port: 6379

  # GitHub Secrets나 .env 대신 사용할 테스트용 더미 OAuth2 값
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test_google_client_id
            client-secret: test_google_client_secret
            redirect-uri: http://localhost:8080/login/oauth2/code/google
            scope:
              - profile
              - email
          kakao:
            client-id: test_kakao_client_id
            client-secret: test_kakao_client_secret
            redirect-uri: http://localhost:8080/login/oauth2/code/kakao
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - profile_nickname
              - account_email

        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

# JWT 테스트용 키
jwt:
  secret: test_jwt_secret_key_for_notice_catch_dummy_value_32bytes
  access-token-expiration: 3600000
  refresh-token-expiration: 1209600000