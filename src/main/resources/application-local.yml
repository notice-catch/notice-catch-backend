spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/notice_catch?characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    driver-class-name: org.mariadb.jdbc.Driver
    username: catch_user
    password: catch_password
  jpa:
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - profile
              - email

jwt:
  secret: ${JWT_SECRET:local_default_jwt_secret_key_for_notice_catch_32bytes}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:3600000} # 기본값 1시간
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:1209600000} # 기본값 14일