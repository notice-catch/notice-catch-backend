name: Notice Catch CD (자동 배포)

# main 브랜치에 push가 발생하면 실행
on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. GitHub 저장소 코드 가져오기
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. JDK 21 세팅
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Gradle 명령어 실행 권한 부여
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. 테스트를 제외하고 bootJar 빌드하기
      - name: Build with Gradle
        run: ./gradlew bootJar -x test

      # 5. Docker 관련 파일 전송
      - name: Transfer Docker files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          source: "infra/Dockerfile,infra/docker-compose-prod.yml"
          target: "/home/ubuntu/infra"
          strip_components: 1

      # 6. 빌드된 jar 파일 전송
      - name: Transfer jar to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          source: "build/libs/*.jar"
          target: "/home/ubuntu/infra"

      # 7. EC2 서버 접속 후 도커 컴포즈 재실행 (SSH)
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ubuntu/infra
            sudo docker compose -f docker-compose-prod.yml up -d --build