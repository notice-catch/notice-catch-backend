name: Notice Catch CI

on:
  pull_request:
    branches: [ "main", "dev" ]
  push:
    branches: [ "dev" ]

permissions:
  contents: read
  issues: write
  checks: write
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. GitHub 저장소의 최신 코드 가져오기
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. JDK 21 환경 세팅 및 Gradle 캐시 설정
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # 3. gradlew 실행 권한 부여
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. 전체 단위 테스트 실행 및 빌드 검증
      # application-test.yml 덕분에 별도의 env/Secrets 지정 없이 바로 빌드가 성공합니다!
      - name: Build and Test with Gradle
        run: ./gradlew build

      # 5. 테스트 실패 시 결과를 GitHub UI에 보기 좋게 리포팅
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always() # 빌드/테스트 실패 시에도 리포트를 위해 항상 실행
        with:
          files: '**/build/test-results/test/TEST-*.xml'